### MONITORS ###
monitor = eDP-1, preferred, 0x0, 1.666667
monitor = , preferred, 0x0, 1


### WORKSPACES ###
workspace = 1, persistent:true, default:true, defaultName:Main
workspace = 2, persistent:true, defaultName:2
workspace = 3, persistent:true, defaultName:3
workspace = 4, persistent:true, defaultName:4

### PROGRAMS ###
$terminal = alacritty
$fileManager = nemo
$menu = rofi -show drun
$browser = brave

### AUTOSTART ###
exec-once = swww-daemon
exec-once = sleep 3 && ~/.config/scripts/wallpaper_rotate.sh &
exec-once = nm-applet --indicator &
exec-once = hyprpolkitagent &
exec-once = wl-clip-persist --clipboard regular &
exec-once = hypr-relay


##############################
### WINDOW RULES ###
##############################

windowrulev2 = float,class:(org.pulseaudio.pavucontrol)
windowrulev2 = size 900 700, class:(org.pulseaudio.pavucontrol)
windowrulev2 = center, class:(org.pulseaudio.pavucontrol)

windowrulev2 = nofocus, class:^(zoom)$, title:^(menu window)$

windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = size 900 700, class:(nm-connection-editor)
windowrulev2 = center, class:(nm-connection-editor)

windowrulev2 = suppressevent maximize, class:.*

windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0


##############################
### LOOK AND FEEL ###
##############################

general {
    gaps_in = 0
    gaps_out = 1
    border_size = 2
    col.active_border = rgba(92cf9cee) rgba(5edb8cee) 45deg
    col.inactive_border = rgba(444444aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1
    inactive_opacity = 1
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = no, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

group {
    col.border_active = rgba(92cf9cee) rgba(5edb8cee) 45deg
    col.border_inactive = rgba(444444aa)
    groupbar {
        enabled = true
        font_size = 11
        gradients = false
        render_titles = true
        col.active = rgba(92cf9cee)
        col.inactive = rgba(444444aa)
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


##############################
### KEYBINDINGS ###
##############################

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod, PERIOD, exec, rofi-bluetooth
bind = $mainMod, Q, killactive,
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, slash, exec, $menu
bind = $mainMod, F3, pseudo,
bind = $mainMod, G, togglegroup
bind = $mainMod, W, changegroupactive, f
bind = $mainMod, B, changegroupactive, b
bind = $mainMod, T, movegroupwindow, f
bind = $mainMod CTRL, H, movewindoworgroup, l
bind = $mainMod CTRL, L, movewindoworgroup, r
bind = $mainMod CTRL, K, movewindoworgroup, u
bind = $mainMod CTRL, J, movewindoworgroup, d
bind = $mainMod, S, swapsplit
bind = $mainMod, V, togglefloating,
bind = $mainMod, F1, exec, hyprctl reload
bind = $mainMod, F2, exec, systemctl --user restart waybar
bind = $mainMod, DELETE, exit
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, M, fullscreen

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = , Print, exec, grimblast copysave area ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod, RIGHT, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, LEFT, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = $mainMod, UP, exec, brightnessctl set 5%+
bindel = $mainMod, DOWN, exec, brightnessctl set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod SHIFT, R, exec, systemctl reboot
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, S, exec, systemctl suspend
bind = $mainMod SHIFT, H, exec, systemctl hibernate
