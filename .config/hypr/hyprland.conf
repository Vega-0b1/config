### MONITORS ###
monitor = eDP-1, preferred, 0x0, 1.666667
monitor = , preferred, 0x0, 1.333333

### WORKSPACES ###
workspace = 1, persistent:true, default:true, defaultName:Main
workspace = 2, persistent:true, defaultName:2
workspace = 3, persistent:true, defaultName:3
workspace = 4, persistent:true, defaultName:4

### PROGRAMS ###
$terminal = alacritty
$fileManager = nemo
$menu = rofi -show drun
$browser = brave

### AUTOSTART ###
exec-once = waybar &
exec-once = hypridle &
exec-once = swww-daemon
exec-once = sleep 3 && ~/.config/scripts/wallpaper_rotate.sh &
exec-once = nm-applet --indicator &
exec-once = hyprpolkitagent &
exec-once = wl-clip-persist --clipboard regular &
exec-once = ~/hypr-relay/target/release/hypr-relay

### SOURCES ###
source = ~/.config/hypr/hypr_custom/window_rules.conf
source = ~/.config/hypr/hypr_custom/look_feel.conf
source = ~/.config/hypr/hypr_custom/keybinds.conf














